            <div class="relative mt-2">

            </div>

            <div class="relative mt-2">

                <select id="lga" required name="lga"
                    class="w-full p-4 rounded-xl bg-white/10  text-white border border-white/20 outline-none focus:border-emerald-400 pl-12">
