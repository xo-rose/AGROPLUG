<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroPlug | Post New Harvest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="images/Agroplug_logo.png">
</head>
<body class="bg-slate-400 font-sans text-slate-800 antialiased">

    <nav class="sticky top-0 z-50 border-b border-slate-100 bg-white/90 backdrop-blur-md">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">
            <a href="index.html" class="flex items-center gap-3">
                <img src="/images/Agroplug_logo.png" alt="AgroPlug Logo" class="h-10 w-10 object-contain rounded-full">
                <span class="text-xl font-black tracking-tight text-slate-900">Agro<span class="text-emerald-600">Plug</span></span>
            </a>
            <div class="flex items-center gap-4">
                <a href="marketplace.php" class="text-sm font-semibold text-slate-700 hover:text-emerald-600 transition">View Market</a>
                <a href="logout.php" class="text-sm font-semibold text-red-600 hover:text-red-700 transition">Sign Out</a>
            </div>
        </div>
    </nav>

    <main class="py-12 px-6">
        <form action="upload.php" method="POST" enctype="multipart/form-data" class="max-w-md mx-auto bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
            <div class="mb-6 flex flex-col items-center">
                <h1 class="text-2xl font-black text-slate-900">Drop a New Harvest</h1>
                <p class="text-slate-700 font-semibold text-sm mt-1">Fill this out to instantly plug your crop to local Abia buyers.</p>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-bold uppercase tracking-wider text-slate-800 mb-2">What are you selling?</label>
                <input type="text" name="crop_name" required placeholder="e.g., Sweet Potatoes" class="w-full rounded-xl border border-slate-500 p-3 placeholder:text-slate-500 text-sm focus:border-emerald-500 focus:outline-none transition">
            </div>

            <div class="mb-4">
                <label class="block text-sm font-bold uppercase tracking-wider text-slate-800 mb-2">Price & Measurement</label>
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" name="price" required placeholder="Price (₦)" class="w-full rounded-xl border border-slate-500 p-3 placeholder:text-slate-500 text-sm focus:border-emerald-500 focus:outline-none transition">
                    <input type="text" name="unit" required placeholder="e.g., Per Big Basket" class="w-full rounded-xl border border-slate-500 p-3 placeholder:text-slate-500 text-sm focus:border-emerald-500 focus:outline-none transition">
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-bold uppercase tracking-wider text-slate-800 mb-2">Snap or Upload Crop Photo</label>
                <div class="flex items-center justify-center w-full">
                    <label class="flex flex-col items-center justify-center w-full h-36 border-2 border-dashed border-slate-200 rounded-2xl cursor-pointer hover:border-emerald-500 bg-slate-50 transition group">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6 text-center px-4">
                            <span class="text-3xl mb-2 group-hover:scale-110 transition-transform">📸</span>
                            <p class="text-xs text-slate-700 font-bold">Tap to open Camera / Gallery</p>
                            <p class="text-2xs text-slate-600 mt-1">PNG or JPG up to 5MB</p>
                        </div>
                        <input type="file" name="crop_image" accept="image/*" required class="hidden" max="5mb"/>
                    </label>
                </div>
            </div>

            <button type="submit" name="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl transition shadow-lg shadow-emerald-600/10 active:scale-[0.98]">
                Post 
            </button>
        </form>
    </main>

</body>
</html>
