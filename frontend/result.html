<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan Result</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-lg">

        <h1 class="text-3xl font-bold mb-6">
            Analysis Result
        </h1>

        <img
            id="resultImage"
            class="w-full h-64 object-cover rounded-xl mb-6"
            alt=""
        >

        <div class="space-y-3">

            <div>
                <span class="font-bold">Category:</span>
                <span id="category"></span>
            </div>

            <div>
                <span class="font-bold">Status:</span>
                <span id="status"></span>
            </div>

            <div>
                <span class="font-bold">Confidence:</span>
                <span id="confidence"></span>
            </div>

            <div>
                <span class="font-bold">Recommendation:</span>
                <p id="recommendation"></p>
            </div>

            <span id="status" class="font-bold"></span>
        </div>

        <a
            href="scan.html"
            class="block text-center mt-8 bg-green-600 text-white py-3 rounded-lg"
        >
            Scan Again
        </a>

    </div>


</body>
</html>
