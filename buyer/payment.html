<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Fund Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: Poppins, sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-100">
    <div class="max-w-6xl mx-auto p-6">
      <a href="buyer-dashboard.html" class="text-emerald-600 font-semibold"
        ><i class="fa fa-arrow-left"></i> Back to Dashboard</a
      >

      <div class="grid lg:grid-cols-3 gap-6 mt-6">
        <div class="lg:col-span-2 bg-white rounded-2xl p-8 shadow">
          <div class="flex items-center gap-4 mb-6">
            <div
              class="w-14 h-14 rounded-xl bg-purple-100 flex items-center justify-center"
            >
              <i class="fa-solid fa-wallet text-purple-600 text-2xl"></i>
            </div>
            <div>
              <h1 class="text-3xl font-bold">Fund Your Wallet</h1>
              <p class="text-slate-500">Add money to your AgroPlug wallet.</p>
            </div>
          </div>

          <label class="font-medium">Amount (₦)</label>
          <input
            id="amount"
            type="number"
            min="100"
            placeholder="Enter amount"
            class="w-full border rounded-xl p-3 mt-2 mb-6"
          />

          <h2 class="font-semibold mb-3">Choose Payment Method</h2>

          <div class="grid sm:grid-cols-2 gap-4">
            <label class="border rounded-xl p-4 cursor-pointer">
              <input
                type="radio"
                name="method"
                value="Card"
                checked
                class="mr-2"
              />
              <i class="fa fa-credit-card text-purple-600"></i> Card
            </label>
            <label class="border rounded-xl p-4 cursor-pointer">
              <input
                type="radio"
                name="method"
                value="Bank Transfer"
                class="mr-2"
              />
              <i class="fa fa-building-columns text-purple-600"></i> Bank
              Transfer
            </label>
            <label class="border rounded-xl p-4 cursor-pointer">
              <input type="radio" name="method" value="USSD" class="mr-2" />
              <i class="fa fa-mobile-screen text-purple-600"></i> USSD
            </label>
            <label class="border rounded-xl p-4 cursor-pointer">
              <input
                type="radio"
                name="method"
                value="Mobile Money"
                class="mr-2"
              />
              <i class="fa fa-wallet text-purple-600"></i> Mobile Money
            </label>
          </div>

          <label class="block mt-6 font-medium">Email</label>
          <input
            id="email"
            type="email"
            placeholder="buyer@example.com"
            class="w-full border rounded-xl p-3 mt-2"
          />

          <button
            onclick="payNow()"
            class="w-full mt-8 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl py-4 font-semibold"
          >
            Proceed to Pay
          </button>
        </div>

        <div class="bg-white rounded-2xl p-6 shadow">
          <h2 class="font-bold text-xl mb-4">Payment Summary</h2>
          <div class="flex justify-between py-2">
            <span>Wallet Funding</span><span id="summaryAmount">₦0</span>
          </div>
          <div class="flex justify-between py-2">
            <span>Transaction Fee</span><span>₦0</span>
          </div>
          <hr class="my-3" />
          <div class="flex justify-between font-bold text-xl">
            <span>Total</span><span id="totalAmount">₦0</span>
          </div>

          <div class="mt-8 p-4 bg-purple-50 rounded-xl">
            <p class="font-semibold text-purple-700">100% Secure Payment</p>
            <p class="text-sm text-slate-600 mt-2">
              Ready to integrate with Paystack.
            </p>
          </div>
        </div>
      </div>
    </div>

    <script>
      const amount = document.getElementById("amount");
      amount.addEventListener("input", () => {
        const v = Number(amount.value) || 0;
        const t = "₦" + v.toLocaleString();
        document.getElementById("summaryAmount").textContent = t;
        document.getElementById("totalAmount").textContent = t;
      });
      function payNow() {
        const v = Number(amount.value);
        if (v < 100) {
          alert("Minimum funding amount is ₦100");
          return;
        }
        const method = document.querySelector(
          'input[name="method"]:checked',
        ).value;
        alert(
          "Proceeding to " +
            method +
            " payment for ₦" +
            v.toLocaleString() +
            ".\n\nReplace this alert with Paystack integration.",
        );
      }
    </script>
  </body>
</html>
