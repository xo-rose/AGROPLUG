<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AgroPlug</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="/images/Agroplug_logo.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @keyframes wiggle {

            0%,
            100% {
                transform: rotate(0deg);
            }

            25% {
                transform: rotate(-15deg);
            }

            75% {
                transform: rotate(15deg);
            }
        }

        .wiggle {
            animation: wiggle 0.5s ease-in-out;
        }

        /* .spin {
            animation: spinAnim cubic-bezier(1, 0, 0, 1) linear;
        }

        @keyframes spinAnim {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        } */
    </style>
</head>

<body class="bg-[url('AgroTech.jpg')] bg-cover bg-center bg-no-repeat relative">
    <div class="absolute inset-0 bg-black/40"></div>

    <div class="flex justify-center items-center h-screen p-4">

        <form id="loginForm" class="bg-white/90 backdrop-blur-md p-8 rounded-lg shadow-lg w-full max-w-[340px]">
            <div class=" font-bold text-emerald-600 mb-5 text-center flex justify-start items-center mr-3">
                <img src="/images/Agroplug_logo.png" alt="" class="w-20" id="logo">
                <div class="flex flex-col">
                    <span class="text-2xl">Welcome Back</span>
                    <span class="text-[9px] text-slate-700">Please login to your account, Thank you !!!</span>

                </div>
            </div>
            <!-- <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-slate-800">
                Login
                 <i class="fa-regular fa-face-smile text-green-600" id="smile"></i> 
            </h2> -->

            <input type="email" id="email" placeholder="Email"
                class="border border-slate-300 p-3 w-full mb-3 rounded-full focus:outline-none focus:border-green-600"
                required>

            <input type="password" id="password" placeholder="Password"
                class="border border-slate-300 p-3 w-full mb-3 rounded-full focus:outline-none focus:border-green-600"
                required>

            <button type="submit"
                class="bg-emerald-600 text-white w-full p-2 rounded-full font-semibold hover:bg-emerald-500 transition active:scale-[0.98]">
                Login
            </button>

            <p id="errorMsg" class="text-red-500 mt-2 text-sm font-medium min-h-[20px]"></p>

            <div class="text-center flex justify-center items-center gap-2">
                <span class="text-xs font-bold text-slate-600">You don't have an account?</span>
                <span class="text-xs font-semibold text-emerald-600"><a href="SignUp.html">Sign Up</a></span>
            </div>
        </form>

    </div>

    <script type="module" src="login.js"></script>

    <script>
        const smile = document.getElementById("smile");
        setInterval(() => {
            smile.classList.add("wiggle");
            setTimeout(() => smile.classList.remove("wiggle"), 500);
        }, 2000);

        const logo = document.getElementById("logo")
        setInterval(() => {
            logo.classList.add("spin");
            setTimeout(() => logo.classList.remove("spin"), 500)
        }, 2000)
    </script>

    <script src="/assets/agroplug-chatbot.js"></script>
</body>

</html>
